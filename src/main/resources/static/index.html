<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusQuiz | Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-container">
        <!-- LOGIN FORM -->
        <div class="glass-card auth-box" id="loginForm">
            <h1>Welcome Back</h1>
            <p>Enter your credentials to access quizzes</p>
            
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" class="input-field" required placeholder="name@college.edu">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" class="input-field" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
            </form>
            
            <div class="auth-switch">
                Don't have an account? <a href="#" onclick="toggleMode('register')">Register here</a>
            </div>
        </div>

        <!-- REGISTER FORM -->
        <div class="glass-card auth-box" id="registerForm" style="display: none;">
            <h1>Create Account</h1>
            <p>Join the secure internal quiz system</p>
            
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" class="input-field" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" class="input-field" required placeholder="name@college.edu">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" class="input-field" required placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="regRole" class="input-field" required>
                        <option value="STUDENT">Student</option>
                        <option value="ADMIN">Admin / Trainer</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary" id="regBtn">Create Account</button>
            </form>
            
            <div class="auth-switch">
                Already have an account? <a href="#" onclick="toggleMode('login')">Sign in</a>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
