<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusQuiz | Student Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .tabs { display: flex; gap: 15px; margin-bottom: 30px; }
        .tab-btn { padding: 10px 20px; border-radius: 12px; background: rgba(30, 41, 59, 0.7); color: white; border: 1px solid var(--glass-border); cursor: pointer; transition: 0.3s; font-weight: 600; }
        .tab-btn.active { background: var(--accent); border-color: var(--accent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from {opacity: 0; transform: translateY(10px);} to {opacity: 1; transform: translateY(0);} }

        .summary-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .summary-card { background: var(--card-bg); padding: 24px; border-radius: 16px; border: 1px solid var(--glass-border); text-align: center; }
        .summary-card h3 { font-size: 2.5rem; color: var(--accent); margin-bottom: 5px; }
        .summary-card p { color: var(--text-muted); font-size: 0.95rem; font-weight: 500; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">Nexus<span>Quiz</span></div>
        <div class="nav-links">
            <span style="color: var(--text-muted); font-weight: 500;">Role: Student</span>
            <button class="btn-outline" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('quizzes')">Today's Quizzes</button>
            <button class="tab-btn" onclick="switchTab('results')">Overall Results</button>
        </div>

        <!-- Quizzes Tab -->
        <div id="quizzes" class="tab-content active">
            <div class="page-header">
                <h2>Scheduled for Today</h2>
                <p style="color: var(--text-muted)">Take these active assessments to boost your grade.</p>
            </div>
            <div class="grid" id="quizzesContainer">
                <p style="color: var(--text-muted)">Loading quizzes...</p>
            </div>
        </div>

        <!-- Results Tab -->
        <div id="results" class="tab-content">
            <div class="page-header">
                <h2>Performance Tracking</h2>
            </div>
            
            <div class="summary-cards">
                <div class="summary-card">
                    <h3 id="totA">0</h3>
                    <p>Total Attempted</p>
                </div>
                <div class="summary-card">
                    <h3 id="avgS">0%</h3>
                    <p>Average Score</p>
                </div>
                <div class="summary-card">
                    <h3 id="bstS">0</h3>
                    <p>Best Score</p>
                </div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Subject</th>
                            <th>Topic</th>
                            <th>Date</th>
                            <th>Score</th>
                            <th>Percentage</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTableBody">
                        <!-- Populated dynamically -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/student/dashboard.js"></script>
</body>
</html>
